<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#111111" rx="8"/>
  
  <!-- Spray splatter dots - cyan -->
  <circle cx="8" cy="10" r="1.5" fill="#00F5FF" opacity="0.7"/>
  <circle cx="55" cy="8" r="1" fill="#00F5FF" opacity="0.6"/>
  <circle cx="58" cy="18" r="1.5" fill="#00F5FF" opacity="0.5"/>
  <circle cx="6" cy="52" r="1" fill="#00F5FF" opacity="0.6"/>
  <circle cx="12" cy="58" r="1.5" fill="#00F5FF" opacity="0.5"/>
  <circle cx="56" cy="55" r="1" fill="#00F5FF" opacity="0.7"/>
  
  <!-- Spray splatter dots - magenta -->
  <circle cx="52" cy="12" r="1" fill="#FF2D78" opacity="0.6"/>
  <circle cx="10" cy="55" r="1.5" fill="#FF2D78" opacity="0.5"/>
  <circle cx="57" cy="50" r="1" fill="#FF2D78" opacity="0.7"/>
  <circle cx="7" cy="20" r="1" fill="#FF2D78" opacity="0.5"/>
  
  <!-- "P" letter - pink shadow offset -->
  <text x="8" y="40" font-family="Impact, 'Arial Black', sans-serif" font-size="38" font-weight="900" fill="#FF2D78" letter-spacing="-2">P</text>
  <!-- "P" letter - yellow foreground -->
  <text x="5" y="37" font-family="Impact, 'Arial Black', sans-serif" font-size="38" font-weight="900" fill="#F5E642" letter-spacing="-2">P</text>
  
  <!-- "B" letter - pink shadow offset -->
  <text x="34" y="40" font-family="Impact, 'Arial Black', sans-serif" font-size="38" font-weight="900" fill="#FF2D78" letter-spacing="-2">B</text>
  <!-- "B" letter - yellow foreground -->
  <text x="31" y="37" font-family="Impact, 'Arial Black', sans-serif" font-size="38" font-weight="900" fill="#F5E642" letter-spacing="-2">B</text>
  
  <!-- Underline accent -->
  <rect x="5" y="43" width="54" height="3" fill="#00F5FF" rx="1"/>
</svg>